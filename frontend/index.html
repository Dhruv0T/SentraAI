<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sentra — Home</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="top-bar">
      <a href="/" class="logo">
        <svg width="28" height="28" viewBox="0 0 31 31" fill="none"><rect width="31" height="31" rx="6" fill="#1D4077"/><path d="M8 15.5h15M15.5 8v15" stroke="#F1F5F9" stroke-width="2" stroke-linecap="round"/></svg>
        <span class="logo-text">Sentra</span>
      </a>
      <div class="search-bar">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" placeholder="Search videos..." />
      </div>
      <nav class="nav-icons">
        <a href="/" class="nav-item active">Home</a>
        <a href="/chat" class="nav-item">Chat</a>
      </nav>
    </header>

    <main class="main">
      <aside class="sidebar">
        <h3>Recent Videos</h3>
        <div class="video-list" id="videoList">
          <div class="video-card">
            <div class="thumb"><span class="badge">ALERT</span></div>
            <div class="meta"><button class="btn-view">View</button><button class="btn-analyze">Analyze</button></div>
          </div>
          <div class="video-card">
            <div class="thumb"><span class="badge">ALERT</span></div>
            <div class="meta"><button class="btn-view">View</button><button class="btn-analyze">Analyze</button></div>
          </div>
          <div class="video-card">
            <div class="thumb"><span class="badge">ALERT</span></div>
            <div class="meta"><button class="btn-view">View</button><button class="btn-analyze">Analyze</button></div>
          </div>
        </div>
      </aside>

      <section class="content">
        <div class="upload-zone" id="uploadZone">
          <svg class="upload-icon" width="72" height="72" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M32 52V24M32 24l-10 10M32 24l10 10"/>
            <path d="M12 40v4a4 4 0 0 0 4 4h32a4 4 0 0 0 4-4v-4"/>
          </svg>
          <p>Upload video for analysis</p>
          <input type="file" id="fileInput" accept="video/*" hidden />
          <button class="btn-primary" onclick="document.getElementById('fileInput').click()">Choose File</button>
        </div>
      </section>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
