<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sentra — Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="top-bar">
      <a href="/" class="logo">
        <svg width="28" height="28" viewBox="0 0 31 31" fill="none"><rect width="31" height="31" rx="6" fill="#1D4077"/><path d="M8 15.5h15M15.5 8v15" stroke="#F1F5F9" stroke-width="2" stroke-linecap="round"/></svg>
        <span class="logo-text">Sentra</span>
      </a>
      <div class="search-bar">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" placeholder="Ask about video analysis..." disabled />
      </div>
      <nav class="nav-icons">
        <a href="/" class="nav-item">Home</a>
        <a href="/chat" class="nav-item active">Chat</a>
      </nav>
    </header>

    <main class="main chat-main">
      <aside class="sidebar chat-sidebar">
        <h3>Reports</h3>
        <select id="reportSelect">
          <option value="">Select report...</option>
        </select>
        <button class="btn-primary" id="btnSummary">Get Summary</button>
        <div class="report-cards" id="reportCards"></div>
      </aside>

      <section class="content chat-content">
        <div id="messages" class="messages">
          <div id="chatEmpty" class="chat-empty">
            <div class="chat-empty-icon">💬</div>
            <h2>Ask about your videos</h2>
            <p>Select a report and ask questions about suspicious activity, flagged times, or get a summary.</p>
            <div class="suggested-prompts" id="suggestedPrompts"></div>
          </div>
        </div>
        <form id="chatForm" class="chat-form">
          <input type="text" id="input" placeholder="Ask about suspicious activity, flagged times, etc." autocomplete="off" />
          <button type="submit" class="btn-send">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
            Send
          </button>
        </form>
      </section>
    </main>
  </div>
  <script src="chat.js"></script>
</body>
</html>
